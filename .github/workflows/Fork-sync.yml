name: Fork-sync

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fork-sync-${{ github.ref }}
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: hafrey1/LunaTV-config
  TARGET_BRANCH: main

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch upstream "${TARGET_BRANCH}"
          git fetch origin "${TARGET_BRANCH}"

      - name: Sync upstream changes
        id: sync
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout "${TARGET_BRANCH}"

          if git merge --ff-only "upstream/${TARGET_BRANCH}"; then
            git push origin "${TARGET_BRANCH}"
            echo "result=fast-forward" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          set +e
          git merge --no-edit "upstream/${TARGET_BRANCH}"
          merge_status=$?
          set -e

          if [ "${merge_status}" -eq 0 ]; then
            git push origin "${TARGET_BRANCH}"
            echo "result=merged" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git diff --name-only --diff-filter=U > upstream-sync-conflicts.txt
          git merge --abort || true
          echo "result=conflict" >> "${GITHUB_OUTPUT}"
          {
            echo "conflict_files<<EOF"
            cat upstream-sync-conflicts.txt
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Report conflicts without failing
        if: steps.sync.outputs.result == 'conflict'
        run: |
          {
            echo "## Fork sync skipped because upstream merge has conflicts"
            echo
            echo "Conflicting files:"
            while IFS= read -r file; do
              [ -n "${file}" ] && echo "- \`${file}\`"
            done <<< "${{ steps.sync.outputs.conflict_files }}"
            echo
            echo "The workflow is intentionally marked successful to avoid repeated failure emails."
          } >> "${GITHUB_STEP_SUMMARY}"
