name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.ref }}
  cancel-in-progress: false

env:
  TARGET_BRANCH: main
  UPSTREAM_REPOSITORY: hafrey1/LunaTV-config
  AUTO_RESOLVE_OURS: "README.md report.md"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_UPSTREAM_TOKEN || github.token }}
          persist-credentials: true

      - name: Sync upstream safely
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch origin "${TARGET_BRANCH}"
          git fetch upstream "${TARGET_BRANCH}"
          git checkout "${TARGET_BRANCH}"
          git reset --hard "origin/${TARGET_BRANCH}"

          pushed=0
          if git merge --ff-only "upstream/${TARGET_BRANCH}"; then
            if git diff --quiet "origin/${TARGET_BRANCH}"..HEAD; then
              echo "Already up to date with ${UPSTREAM_REPOSITORY}:${TARGET_BRANCH}." >> "$GITHUB_STEP_SUMMARY"
            else
              git push origin "${TARGET_BRANCH}"
              pushed=1
              echo "Fast-forwarded from ${UPSTREAM_REPOSITORY}:${TARGET_BRANCH}." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            git merge --abort || true
            if git merge --no-edit "upstream/${TARGET_BRANCH}"; then
              git push origin "${TARGET_BRANCH}"
              pushed=1
              echo "Merged upstream ${UPSTREAM_REPOSITORY}:${TARGET_BRANCH}." >> "$GITHUB_STEP_SUMMARY"
            else
              mapfile -t conflicted < <(git diff --name-only --diff-filter=U)
              can_auto_resolve=1
              for file in "${conflicted[@]}"; do
                case " $AUTO_RESOLVE_OURS " in
                  *" $file "*) ;;
                  *) can_auto_resolve=0 ;;
                esac
              done

              if [[ "${#conflicted[@]}" -gt 0 && "$can_auto_resolve" == "1" ]]; then
                git checkout --ours -- "${conflicted[@]}"
                git add "${conflicted[@]}"
                git commit -m "chore: merge upstream preserving local generated reports"
                git push origin "${TARGET_BRANCH}"
                pushed=1
                echo "Merged upstream and preserved local generated report files:" >> "$GITHUB_STEP_SUMMARY"
                for file in "${conflicted[@]}"; do
                  echo "- $file" >> "$GITHUB_STEP_SUMMARY"
                done
              else
                echo "Upstream sync has conflicts and was left unchanged." >> "$GITHUB_STEP_SUMMARY"
                echo "Conflicted files:" >> "$GITHUB_STEP_SUMMARY"
                for file in "${conflicted[@]}"; do
                  echo "- $file" >> "$GITHUB_STEP_SUMMARY"
                done
                git merge --abort || true
                exit 1
              fi
            fi
          fi

          if [[ "$pushed" == "0" ]]; then
            last_commit_ts=$(git log -1 --format=%ct "origin/${TARGET_BRANCH}")
            now_ts=$(date -u +%s)
            if (( now_ts - last_commit_ts > 3888000 )); then
              mkdir -p .github
              date -u +"last successful upstream check: %Y-%m-%dT%H:%M:%SZ" > .github/sync-upstream-keepalive.txt
              git add .github/sync-upstream-keepalive.txt
              if git commit -m "chore: keep upstream sync workflow active"; then
                git push origin "${TARGET_BRANCH}"
                echo "Created keepalive commit to keep scheduled workflow active." >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi
